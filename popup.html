<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self'; object-src 'none'; base-uri 'none';">
  <title>Malaware</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <section id="main-view">
    <h1>Malaware</h1>
    <p class="description" data-i18n="popupDescription"></p>
    <p id="enabled-status" class="status-line" role="status" aria-live="polite"></p>
    <button id="toggle" type="button" aria-pressed="true" data-i18n="popupBtnDisable"></button>
    <button id="import" type="button" class="secondary" data-i18n="popupBtnImport"></button>
  </section>

  <section id="import-view" hidden>
    <h1 data-i18n="importHeading"></h1>
    <p class="hint" data-i18n="importHint"></p>
    <textarea id="domains" rows="10" data-i18n-attr="placeholder:importPlaceholder"></textarea>
    <input type="file" id="file" accept=".txt,text/plain" hidden>
    <button id="load-file" type="button" class="secondary" data-i18n="importBtnFile"></button>
    <button id="import-standard" type="button" class="secondary" data-i18n="importBtnStandard"></button>
    <button id="save" type="button" data-i18n="importBtnSave"></button>
    <button id="back" type="button" class="secondary" data-i18n="importBtnBack"></button>
    <p id="status" role="status" aria-live="polite"></p>
  </section>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
