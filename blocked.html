<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self'; object-src 'none'; base-uri 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="blockedTitle">Blocked — Malaware</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    main {
      text-align: center;
      padding: 2rem;
      max-width: 36rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; line-height: 1.4; }
    p { margin-top: 1rem; color: #999; font-size: 0.9rem; }
    .blocked-url {
      margin-top: 1.25rem;
      padding: 0.5rem 0.75rem;
      background: #2a2a2a;
      border-radius: 6px;
      font-family: ui-monospace, monospace;
      font-size: 0.85rem;
      color: #ddd;
      word-break: break-all;
      display: inline-block;
      max-width: 100%;
    }
    .blocked-label {
      display: block;
      color: #777;
      font-size: 0.75rem;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main role="alert">
    <h1 data-i18n="blockedHeading"></h1>
    <p data-i18n="blockedSubtitle"></p>
    <div id="blocked-row" hidden>
      <span class="blocked-label" data-i18n="blockedLabel"></span>
      <span id="blocked-url" class="blocked-url"></span>
    </div>
  </main>
  <script src="i18n.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
